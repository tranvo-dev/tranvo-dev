name: Sync README

on:
  schedule:
    - cron: '0 0 * * *'      # daily at 00:00 UTC
  workflow_dispatch: {}       # allows manual "Run workflow" trigger
  push:
    branches: [main]
    paths-ignore:
      - README.md            # avoid loop from the bot's own commit

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-sync projects and tech stack"
          git push